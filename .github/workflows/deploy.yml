name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  schedule:
    # Run weekly on Saturdays at 10:00 UTC (matches scraper cadence)
    - cron: '0 10 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Scrape fresh concert data ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install playwright reportlab

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run concert scraper
        run: python concert_weekly.py
        timeout-minutes: 20

      - name: Export static data for demo frontend
        run: python scripts/export_static_data.py

      # ── Commit updated data back to repo ──
      - name: Commit updated concert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add concert_state.json frontend/public/static-data.json
          git diff --cached --quiet || git commit -m "chore: update concert data [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build frontend in demo mode ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (demo mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
