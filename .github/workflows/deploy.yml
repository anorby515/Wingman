name: Deploy to GitHub Pages

# Builds the frontend and deploys to GitHub Pages.
# Only deploys from main — feature branches must NOT deploy to Pages
# because they carry a snapshot of docs/summary.json from their branch
# point, which overwrites the latest Ticketmaster data on the live site.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # Skip when the push was a data-update commit from the TM action —
    # that workflow already builds and deploys to Pages itself.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'Data update:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Export static data for demo frontend ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pydantic

      - name: Export static data for demo frontend
        run: python scripts/export_static_data.py

      # ── Build frontend in demo mode ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (demo mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
