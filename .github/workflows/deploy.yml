name: Deploy to GitHub Pages

# Scraping is now handled by Claude Cowork sessions (not CI).
# This workflow only builds the frontend and deploys to GitHub Pages.
# Triggered when Cowork pushes updated data (concert_state.json, docs/).

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Export static data for demo frontend ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pydantic

      - name: Export static data for demo frontend
        run: python scripts/export_static_data.py

      # ── Build frontend in demo mode ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (demo mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
