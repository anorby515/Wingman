name: Daily TM Data Fetch + Deploy

# Fetches Ticketmaster data daily, generates docs/summary.json,
# builds the frontend, and deploys to GitHub Pages.

on:
  schedule:
    # Run daily at 10:00 UTC (5:00 AM Central)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: data-fetch
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # ── Python: fetch TM data + geocode ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pydantic

      - name: Fetch Ticketmaster data
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python scripts/fetch_tm_data.py

      # ── Commit data files ──
      - name: Read fetch stats
        id: stats
        run: |
          if [ -f .fetch_stats.json ]; then
            echo "date=$(python3 -c "import json; print(json.load(open('.fetch_stats.json'))['date'])")" >> "$GITHUB_OUTPUT"
            echo "artists=$(python3 -c "import json; print(json.load(open('.fetch_stats.json'))['artists_count'])")" >> "$GITHUB_OUTPUT"
            echo "shows=$(python3 -c "import json; print(json.load(open('.fetch_stats.json'))['total_shows'])")" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Fast-forward to latest origin/main BEFORE committing so our
          # data commit sits on top and no rebase is needed.  The reset
          # moves the branch pointer without touching the working tree,
          # so the freshly generated data files are preserved.
          git fetch origin main
          git reset origin/main
          git add docs/summary.json "docs/history/*.json"
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Data update: ${{ steps.stats.outputs.date }} - ${{ steps.stats.outputs.artists }} artists, ${{ steps.stats.outputs.shows }} shows"
            git push origin main
          fi

      # ── Node: build frontend ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (demo mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - uses: actions/deploy-pages@v4
        id: deployment

  # ── Notify: SMS alerts for new shows (schedule-only) ──
  notify:
    needs: fetch-and-deploy
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the latest main which includes the just-committed summary.json
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for changes and send SMS
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: python scripts/notify_changes.py

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/notification_baseline.json
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "Update notification baseline"
            git push origin main
          fi
